<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>내 메모장</title>
</head>
<body>
    <div class="container">
        <div class="memo-card">
            <h1>내 메모장</h1>
            <textarea id="memoInput" placeholder="여기에 메모를 작성하세요..."></textarea>
            <div class="button-group">
                <button id="clearBtn">초기화</button>
            </div>
        </div>
    </div>

    <!-- 커스텀 모달 -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-content">
                <p id="modalMessage"></p>
                <button id="modalBtn" class="modal-btn">확인</button>
            </div>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div id="confirmOverlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-content">
                <p id="confirmMessage"></p>
                <div class="confirm-buttons">
                    <button id="confirmYes" class="modal-btn confirm-yes">예</button>
                    <button id="confirmNo" class="modal-btn confirm-no">아니오</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
